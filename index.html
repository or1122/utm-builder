<div id="app">
  <style>
    #app {
      --ink: #14181f;
      --paper: #fbfaf7;
      --line: #e2ddd2;
      --brand: #1b6b5c;
      --brand-soft: #e7f1ee;
      --accent: #d8632a;
      --muted: #6b7280;
      --field: #ffffff;
      font-family: -apple-system, "Segoe UI", Rubik, Arial, sans-serif;
      direction: rtl;
      color: var(--ink);
      background: var(--paper);
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 22px 40px;
      box-sizing: border-box;
    }
    #app * { box-sizing: border-box; }
    #app h1 {
      font-size: 24px;
      margin: 0 0 4px;
      letter-spacing: -0.01em;
    }
    #app .sub {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 22px;
    }
    #app .card {
      background: var(--field);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px 18px 20px;
      margin-bottom: 16px;
    }
    #app label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 6px;
    }
    #app .hint { font-weight: 400; color: var(--muted); }
    #app input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 9px;
      font-size: 14px;
      background: var(--paper);
      font-family: inherit;
    }
    #app input[type="text"]:focus {
      outline: 2px solid var(--brand);
      outline-offset: -1px;
      background: #fff;
    }
    #app .row { margin-bottom: 14px; }
    #app .row:last-child { margin-bottom: 0; }
    #app .field-wrap { display: flex; gap: 8px; }
    #app .field-wrap input { flex: 1; }
    #app .field-wrap select {
      flex: 0 0 auto;
      max-width: 150px;
      padding: 10px 8px;
      border: 1px solid var(--line);
      border-radius: 9px;
      font-size: 12px;
      background: var(--paper);
      color: var(--muted);
      font-family: inherit;
    }
    #app .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }
    #app .toggle input { width: 18px; height: 18px; accent-color: var(--brand); cursor: pointer; }
    #app .toggle .t-text { font-size: 13px; }
    #app .toggle .t-text b { display: block; font-size: 13px; }
    #app .toggle .t-text span { color: var(--muted); font-size: 12px; }
    #app .out-label {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 8px;
    }
    #app .out-label .tag {
      font-size: 11px; color: var(--brand); background: var(--brand-soft);
      padding: 2px 8px; border-radius: 20px; font-weight: 600;
    }
    #app .output {
      background: #0f1216;
      color: #d6e8e3;
      border-radius: 10px;
      padding: 13px 14px;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 12.5px;
      line-height: 1.6;
      direction: ltr;
      text-align: left;
      word-break: break-all;
      min-height: 20px;
      white-space: pre-wrap;
    }
    #app .output .k { color: #5fb3a1; }
    #app .output .g { color: #e0975f; }
    #app .btns { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    #app button {
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 18px;
      border-radius: 9px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform .05s, background .15s;
    }
    #app button:active { transform: translateY(1px); }
    #app .b-copy { background: var(--brand); color: #fff; }
    #app .b-copy:hover { background: #155649; }
    #app .b-short { background: #fff; color: var(--accent); border-color: var(--accent); }
    #app .b-short:hover { background: #fdf1ea; }
    #app .b-short:disabled { color: #b9b3a8; border-color: var(--line); cursor: not-allowed; background: #f4f2ec; }
    #app .warn {
      margin-top: 10px; font-size: 12.5px; color: #8a5a1c;
      background: #fdf3e3; border: 1px solid #f0ddbc; border-radius: 8px;
      padding: 9px 11px; display: none;
    }
    #app .warn.show { display: block; }
    #app .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 24px;
      font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 50;
    }
    #app .toast.show { opacity: 1; }
    #app .sec-title { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: .04em; margin: 0 0 12px; text-transform: uppercase; }
  </style>

  <h1>בונה לינקים — BNC</h1>
  <p class="sub">תבנית גרסה 2: UTM רגיל + global_utm כפול. תומך בערכים דינמיים של מטא וקיצור לינק.</p>

  <div class="card">
    <div class="row">
      <label>כתובת בסיס <span class="hint">(ה-URL בלי פרמטרים)</span></label>
      <input type="text" id="base" placeholder="https://project.bnc-investment.co.il/Nosha.DC.Apartments" value="https://project.bnc-investment.co.il/Nosha.DC.Apartments">
    </div>
  </div>

  <div class="card">
    <p class="sec-title">פרמטרים</p>
    <div class="row">
      <label>source <span class="hint">— חובה</span></label>
      <div class="field-wrap">
        <input type="text" id="source" placeholder="ravmesser">
        <select data-target="source"><option value="">ידני…</option><option value="facebook">facebook</option><option value="instagram">instagram</option><option value="ravmesser">ravmesser</option></select>
      </div>
    </div>
    <div class="row">
      <label>medium <span class="hint">— חובה</span></label>
      <div class="field-wrap">
        <input type="text" id="medium" placeholder="sms">
        <select data-target="medium"><option value="">ידני…</option><option value="sms">sms</option><option value="cpc">cpc</option><option value="paid_social">paid_social</option><option value="email">email</option></select>
      </div>
    </div>
    <div class="row">
      <label>campaign <span class="hint">— חובה</span></label>
      <div class="field-wrap">
        <input type="text" id="campaign" placeholder="nosha.dc">
        <select data-target="campaign"><option value="">ידני…</option><option value="{{campaign.name}}">דינמי: שם הקמפיין</option></select>
      </div>
    </div>
    <div class="row">
      <label>term <span class="hint">— אופציונלי</span></label>
      <div class="field-wrap">
        <input type="text" id="term" placeholder="">
        <select data-target="term"><option value="">ידני…</option><option value="{{adset.name}}">דינמי: שם האדסט</option></select>
      </div>
    </div>
    <div class="row">
      <label>content <span class="hint">— אופציונלי</span></label>
      <div class="field-wrap">
        <input type="text" id="content" placeholder="">
        <select data-target="content"><option value="">ידני…</option><option value="{{ad.name}}">דינמי: שם המודעה</option><option value="{{placement}}">דינמי: מיקום (placement)</option></select>
      </div>
    </div>
  </div>

  <div class="card">
    <label class="toggle">
      <input type="checkbox" id="fbmode">
      <span class="t-text">
        <b>מצב פייסבוק דינמי</b>
        <span>כשמסומן — נשמרים הפלייסהולדרים {{...}} והקיצור מושבת (קיצור היה מקבע אותם).</span>
      </span>
    </label>
  </div>

  <div class="card">
    <div class="out-label">
      <label style="margin:0;">הלינק המוכן</label>
      <span class="tag">גרסה 2</span>
    </div>
    <div class="output" id="out"></div>
    <div class="btns">
      <button class="b-copy" id="copy">העתק לינק</button>
      <button class="b-short" id="short">צור לינק מקוצר (TinyURL)</button>
    </div>
    <div class="warn" id="warn">במצב פייסבוק דינמי אי אפשר לקצר — הקיצור מקבע את הכתובת והפלייסהולדרים {{...}} לא יוחלפו.</div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const fields = ["source","medium","campaign","term","content"];
  const baseEl = $("base"), fbEl = $("fbmode"), outEl = $("out");

  // wire dropdowns -> inputs
  document.querySelectorAll("#app select[data-target]").forEach(sel=>{
    sel.addEventListener("change", ()=>{
      if(sel.value) $(sel.dataset.target).value = sel.value;
      build();
    });
  });

  function enc(v){
    // keep meta placeholders {{...}} unencoded so FB can substitute them
    if(/^\{\{.*\}\}$/.test(v.trim())) return v.trim();
    return encodeURIComponent(v.trim());
  }

  function build(){
    const base = baseEl.value.trim().replace(/\?+$/,"");
    const vals = {};
    fields.forEach(f=> vals[f] = $(f).value.trim());

    // regular utm (only non-empty)
    const reg = [];
    const glob = [];
    [["source","utm_source","global_utm_source"],
     ["medium","utm_medium","global_utm_medium"],
     ["campaign","utm_campaign","global_utm_campaign"],
     ["term","utm_term","global_utm_term"],
     ["content","utm_content","global_utm_content"]].forEach(([key,u,g])=>{
       if(vals[key]){
         reg.push(u+"="+enc(vals[key]));
         glob.push(g+"="+enc(vals[key]));
       }
     });

    let url = base;
    const all = reg.concat(glob);
    if(all.length) url += "?" + all.join("&");

    // colorized display
    let html = base.replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));
    if(all.length){
      html += "?";
      html += reg.map(p=>'<span class="k">'+escapeHtml(p)+'</span>').join("&");
      if(glob.length) html += "&" + glob.map(p=>'<span class="g">'+escapeHtml(p)+'</span>').join("&");
    }
    outEl.innerHTML = html || '<span style="color:#6b7280">— הזן כתובת בסיס —</span>';

    // fb mode handling
    const isFb = fbEl.checked;
    $("short").disabled = isFb;
    $("warn").classList.toggle("show", isFb);

    return url;
  }

  function escapeHtml(s){ return s.replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c])); }

  function toast(msg){
    const t=$("toast"); t.textContent=msg; t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),1800);
  }

  $("copy").addEventListener("click", async ()=>{
    const url = build();
    try{ await navigator.clipboard.writeText(url); toast("הלינק הועתק ✓"); }
    catch(e){
      const ta=document.createElement("textarea"); ta.value=url; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy"); ta.remove(); toast("הלינק הועתק ✓");
    }
  });

  $("short").addEventListener("click", async ()=>{
    const url = build();
    if(!url || fbEl.checked) return;
    // open tinyurl create page with the long url prefilled
    const tiny = "https://tinyurl.com/app/?url=" + encodeURIComponent(url);
    window.open(tiny, "_blank");
    try{ await navigator.clipboard.writeText(url); toast("הלינק הועתק + נפתח TinyURL ✓"); }
    catch(e){ toast("נפתח TinyURL — הדבק את הלינק"); }
  });

  // bind inputs
  [baseEl, fbEl, ...fields.map($)].forEach(el=> el.addEventListener("input", build));
  fbEl.addEventListener("change", build);
  build();
})();
</script>
